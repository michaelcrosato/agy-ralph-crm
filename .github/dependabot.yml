version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      weekly-npm-minors:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - automated

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 3
    groups:
      weekly-actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - automated
